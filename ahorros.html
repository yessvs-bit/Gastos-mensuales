<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#6c5ce7" />
  <title>Ahorros Yessi & Andy</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app-shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">Yessi & Andy</p>
        <h1>Ahorros</h1>
      </div>
      <div class="header-actions">
        <a class="icon-btn nav-link" href="index.html">Gastos</a>
        <button id="sincronizarBtn" class="icon-btn" type="button">↻</button>
      </div>
    </header>

    <p id="estadoSync" class="sync-status">Conectando con Google Sheets…</p>

    <section class="panel">
      <div class="section-head">
        <div>
          <h2>Saldos</h2>
          <small>Independientes por persona y moneda</small>
        </div>
      </div>

      <div class="segmented" id="personaResumenSelector">
        <button type="button" data-value="Yessi" class="active">YESSI</button>
        <button type="button" data-value="Andy">ANDY</button>
      </div>

      <div id="resumenAhorros" class="savings-summary savings-page-summary"></div>
      <div id="ahorrosVacio" class="empty">Todavía no hay ahorros registrados.</div>
    </section>

    <section class="panel">
      <div class="section-head">
        <div>
          <h2>Registrar movimiento</h2>
          <small>Aporte, retiro o rendimiento</small>
        </div>
      </div>

      <form id="ahorroForm" autocomplete="off">
        <div>
          <span class="field-title">Persona</span>
          <div class="segmented" id="personaAhorroSelector">
            <button type="button" data-value="Yessi" class="active">YESSI</button>
            <button type="button" data-value="Andy">ANDY</button>
          </div>
        </div>

        <label>
          <span>Fecha</span>
          <input id="fechaAhorro" type="date" required />
        </label>

        <div>
          <span class="field-title">Fondo</span>
          <div class="savings-fund-row">
            <select id="fondoAhorro">
              <option value="Libro">Libro</option>
              <option value="Salud">Salud</option>
              <option value="Casa">Casa</option>
              <option value="Libre">Libre</option>
              <option value="Dólares">Dólares</option>
            </select>
            <input id="fondoNuevo" type="text" placeholder="O crear otro fondo" />
          </div>
        </div>

        <div>
          <span class="field-title">Moneda</span>
          <div class="segmented" id="monedaAhorroSelector">
            <button type="button" data-value="ARS" class="active">PESOS</button>
            <button type="button" data-value="USD">DÓLARES</button>
          </div>
        </div>

        <div>
          <span class="field-title">Movimiento</span>
          <div class="segmented three" id="movimientoAhorroSelector">
            <button type="button" data-value="Aporte" class="active">Aporte</button>
            <button type="button" data-value="Retiro">Retiro</button>
            <button type="button" data-value="Rendimiento">Rendimiento</button>
          </div>
        </div>

        <label>
          <span>Importe</span>
          <div class="money-field">
            <span id="simboloMonedaAhorro">$</span>
            <input id="importeAhorro" type="number" min="0" step="0.01" inputmode="decimal" placeholder="0,00" required />
          </div>
        </label>

        <button id="guardarAhorroBtn" class="btn primary" type="submit">Guardar ahorro</button>
        <p id="mensajeAhorro" class="message" aria-live="polite"></p>
      </form>
    </section>

    <section class="panel">
      <div class="section-head">
        <div>
          <h2>Historial de ahorros</h2>
          <small id="cantidadAhorros">0 movimientos</small>
        </div>
      </div>
      <div id="listaAhorros" class="movement-list"></div>
    </section>
  </main>

  <script src="ahorros.js"></script>
</body>
</html>
